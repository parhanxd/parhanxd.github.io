<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        /* Mengatur dasar halaman agar konten berada tepat di tengah */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffb3c6 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Desain kotak kartu ucapan */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 75, 110, 0.15);
            text-align: center;
            max-width: 350px;
            width: 80%;
            border: 2px solid #fff;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.03);
        }

        /* Animasi detak jantung untuk ikon love */
        .heart {
            font-size: 80px;
            color: #ff4b6e;
            cursor: pointer;
            display: inline-block;
            animation: heartbeat 1.2s infinite;
            filter: drop-shadow(0 5px 15px rgba(255, 75, 110, 0.4));
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.15); }
            40% { transform: scale(1); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Gaya teks utama */
        h1 {
            color: #ff4b6e;
            margin: 20px 0 10px 0;
            font-size: 2.2rem;
            letter-spacing: -1px;
        }

        /* Gaya pesan maaf dan rayuan */
        p {
            color: #665559;
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0;
        }

        /* Dekorasi tambahan berupa teks kecil di bawah */
        .footer {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #ffa3b1;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Ikon hati yang berdetak -->
        <div class="heart">❤️</div>
        
        <!-- Kalimat ungkapan -->
        <h1>I Love You</h1>
        
        <!-- Pesan khusus untuk membujuknya -->
        <p>Maafin aku ya, Sayang? Aku gak mau kita marahan kayak gini lagi. Senyum dong... 😊</p>
        
        <div class="footer">Klik Love Di Atas</div>
    </div>

</body>
</html>
